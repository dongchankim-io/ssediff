services:
  ssediff:
    build:
      context: .
      args:
        # Override at build time, e.g. `docker compose build --build-arg VERSION=$(git describe --always --dirty)`.
        VERSION: dev
    image: ssediff:local
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      BUFFER_TTL_MS: "30000"
      LOG_LEVEL: "INFO"
      # Set ALLOW_PRIVATE_TARGETS=true *only* in a sandboxed lab where
      # the upstream SSE endpoints are intentionally on the loopback /
      # private RFC1918 ranges. See spec §3.6.
      # ALLOW_PRIVATE_TARGETS: "false"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "--tries=1", "http://127.0.0.1:8080/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
