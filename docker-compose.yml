# ssediff — full stack in one service.
#
# The image bundles the Go API (SSE ingestion, matcher, WebSocket hub) and the
# production-built React UI (served from /app/public by the same process).
# Open http://localhost:8080 after `make up`.

services:
  ssediff:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
    image: ssediff:local
    container_name: ssediff
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      BUFFER_TTL_MS: "30000"
      LOG_LEVEL: "INFO"
      PUBLIC_DIR: "/app/public"
      # ALLOW_PRIVATE_TARGETS: "true"   # lab only — see spec §3.6
      # INSECURE_SKIP_VERIFY: "true"    # lab only
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "--tries=1", "http://127.0.0.1:8080/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
